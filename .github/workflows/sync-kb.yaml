name: Sync Klaudia Knowledge

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  sync:
    name: "Sync "
    strategy:
      fail-fast: false
      matrix:
        include:
          - file_type: knowledge-base
            directory: ./kb
          - file_type: blueprint
            directory: ./blueprints

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync ${{ matrix.file_type }} to Klaudia
        uses: davidcollom/komodor-klaudia-sync@v1
        with:
          directory: ${{ matrix.directory }}
          file-type: ${{ matrix.file_type }}
          api-key: ${{ secrets.KOMODOR_API_KEY }}
          dry-run: ${{ github.ref != 'refs/heads/main' }}
